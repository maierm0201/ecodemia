backend:
  name: git-gateway
  branch: main

locale: de

media_folder: "uploads/media"
public_folder: "/uploads/media"

collections:
  - name: "articles"
    label: "Artikel"
    label_singular: "Artikel"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "article_view/code.html?slug={{slug}}"
    summary: "{{title}} ({{date}})"
    fields:
      - label: "Titel"
        name: "title"
        widget: "string"

      - label: "Datum"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        default: ""

      - label: "Kategorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Climate",      value: "climate"  }
          - { label: "Wildlife",     value: "wildlife" }
          - { label: "Energy",       value: "energy"   }
          - { label: "Living",       value: "living"   }
          - { label: "Tech",         value: "tech"     }
          - { label: "Policy",       value: "policy"   }
          - { label: "Live Updates", value: "live"     }

      - label: "Titelbild"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Empfohlene Größe: 1200 × 630 px"

      - label: "Kurzbeschreibung"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Kurze Zusammenfassung – erscheint in Listen und auf der Kategorieseite"

      - label: "Fließtext"
        name: "body"
        widget: "markdown"
