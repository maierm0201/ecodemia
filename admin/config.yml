backend:
  name: github
  repo: maierm0201/ecodemia
  branch: main
  base_url: https://www.ecodemia.org
  auth_endpoint: api/auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/article/{{slug}}"
    summary: "{{title}} ({{date}})"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        required: true

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        required: false
        default: ""

      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Climate",  value: "climate"  }
          - { label: "Wildlife", value: "wildlife" }
          - { label: "Energy",   value: "energy"   }
          - { label: "Living",   value: "living"   }
          - { label: "Tech",     value: "tech"     }
          - { label: "Policy",   value: "policy"   }

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Recommended size: 1200 × 630 px"

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Short summary shown in article lists and category pages"

      - label: "Body (English)"
        name: "body"
        widget: "markdown"
        required: false

      - label: "Title (Deutsch)"
        name: "title_de"
        widget: "string"
        required: false
        hint: "German title — leave blank to show the English title"

      - label: "Excerpt (Deutsch)"
        name: "excerpt_de"
        widget: "text"
        required: false
        hint: "German excerpt — leave blank to show the English excerpt"

      - label: "Body (Deutsch)"
        name: "body_de"
        widget: "markdown"
        required: false
        hint: "German body — leave blank to show the English body"
