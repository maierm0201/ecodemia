backend:
  name: github
  repo: maierm0201/ecodemia
  branch: main
  auth_type: pkce
  # Create a GitHub OAuth App at github.com/settings/developers
  # → Set "Authorization callback URL" to https://<your-vercel-domain>/admin
  # → Paste the Client ID below (no secret needed for PKCE)
  app_id: Ov23li6AkXpqvY0oYJym

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "content/articles"
    create: true
    delete: true
    slug: "{{slug}}"
    preview_path: "/article/{{slug}}"
    summary: "{{title}} ({{date}})"
    fields:
      - label: "Title"
        name: "title"
        widget: "string"
        required: true

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
        required: false
        default: ""

      - label: "Category"
        name: "category"
        widget: "select"
        required: false
        options:
          - { label: "Climate",  value: "climate"  }
          - { label: "Wildlife", value: "wildlife" }
          - { label: "Energy",   value: "energy"   }
          - { label: "Living",   value: "living"   }
          - { label: "Tech",     value: "tech"     }
          - { label: "Policy",   value: "policy"   }

      - label: "Language"
        name: "language"
        widget: "select"
        required: false
        default: "en"
        options:
          - { label: "English", value: "en" }
          - { label: "German",  value: "de" }

      - label: "Cover Image"
        name: "cover_image"
        widget: "image"
        required: false
        hint: "Recommended size: 1200 × 630 px"

      - label: "Excerpt"
        name: "excerpt"
        widget: "text"
        required: false
        hint: "Short summary shown in article lists and category pages"

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false
